<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
      name="description"
      content="eK Acre Growth for field onboarding, support, procurement, and settlement tracking.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="eK Acre Growth">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>eK Acre Growth</title>
  <link rel="manifest" href="manifest.json">
  <script src="mappls-config.js"></script>
  <script>
    (function () {
      const key = window.__MAPPLS_WEB_STATIC_KEY__;
      const sdkVersion = window.__MAPPLS_WEB_SDK_VERSION__ || "3.0";

      if (!key) {
        window.__MAPPLS_WEB_DISABLED__ = true;
        console.warn(
          "Mappls web SDK is disabled. Set window.__MAPPLS_WEB_STATIC_KEY__ in web/mappls-config.js before building for testers."
        );
        return;
      }

      const script = document.createElement("script");
      script.src =
        "https://sdk.mappls.com/map/sdk/web?v=" +
        encodeURIComponent(sdkVersion) +
        "&access_token=" +
        encodeURIComponent(key);
      script.async = false;
      document.head.appendChild(script);
    })();
  </script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
